<!DOCTYPE html>
<html>
<head>
<title>For Sakshi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

/* Sections */
.section {
    height: 100vh;
    width: 100%;
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: white;
    transition: 1s;
    opacity: 0;
    transform: translateY(50px);
}

.section.active {
    opacity: 1;
    transform: translateY(0);
}

/* Premium Gradient Background */
body {
    background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffb6c1);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Glass Card */
.card {
    background: rgba(255,255,255,0.15);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    width: 70%;
}

/* Text */
h1 {
    font-size: 40px;
}

p {
    font-size: 18px;
}

/* Buttons */
button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    margin: 10px;
    cursor: pointer;
    font-size: 16px;
}

.yes {
    background: white;
    color: #ff4d6d;
}

.no {
    background: #ff4d6d;
    color: white;
    position: relative;
}

/* Floating hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}

/* Final text */
#finalText {
    font-size: 35px;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
}
</style>

</head>

<body>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div class="section active" id="page1">
    <div class="card">
        <h1>💖 For Sakshi 💖</h1>
        <p>A special surprise just for you ✨</p>
        <button onclick="nextPage(2); startMusic()">Open 💌</button>
    </div>
</div>

<!-- PAGE 2 -->
<div class="section" id="page2">
    <div class="card">
        <h1>🎂 Happy Birthday Sakshi 💖</h1>
        <p>
            You are the most beautiful part of my life ✨<br>
            Every moment with you feels magical 💕<br><br>

            I will love you forever 💖<br>
            Your happiness is my peace ✨
        </p>
        <button onclick="nextPage(3)">Next 💫</button>
    </div>
</div>

<!-- PAGE 3 -->
<div class="section" id="page3">
    <div class="card">
        <h1>💍 Sakshi 💖</h1>
        <p>Will you be mine forever? 🥺</p>

        <button class="yes" onclick="yesClick()">YES 💖</button>
        <button class="no" id="noBtn">NO 😢</button>
    </div>
</div>

<!-- PAGE 4 -->
<div class="section" id="page4">
    <h1 id="finalText"></h1>
</div>

<script>

// Page transition
function nextPage(num) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById("page"+num).classList.add("active");
}

// Music
function startMusic() {
    document.getElementById("music").play();
}

// YES click
function yesClick() {
    nextPage(4);
    typeText("💖 ASAD IS TOTALLY YOURS 💖");

    for(let i=0;i<40;i++){
        let heart=document.createElement("div");
        heart.innerHTML="💖";
        heart.className="heart";
        heart.style.left=Math.random()*100+"vw";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),4000);
    }
}

// Typing effect
function typeText(text){
    let i=0;
    let target=document.getElementById("finalText");

    function type(){
        if(i<text.length){
            target.innerHTML+=text[i];
            i++;
            setTimeout(type,80);
        }
    }
    type();
}

// NO button escape
let noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
    noBtn.style.position="absolute";
    noBtn.style.left=Math.random()*90+"vw";
    noBtn.style.top=Math.random()*90+"vh";
});

</script>

</body>
</html>
