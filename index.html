<!DOCTYPE html>
<html>
<head>
<title>For Sakshi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
}

/* Glass container */
.container {
    margin-top: 120px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
    color: white;
}

/* Heading */
h1 {
    font-size: 45px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 25px hotpink; }
}

/* Button */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: white;
    color: hotpink;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: hotpink;
    color: white;
    transform: scale(1.1);
}

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    color: hotpink;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    z-index: 10;
    transition: 0.4s;
}

.popup.show {
    transform: translate(-50%, -50%) scale(1);
}

.popup h2 {
    font-size: 30px;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}

</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday Sakshi 💖</h1>

    <p>
        You are the most beautiful part of my life ✨<br>
        Every moment with you feels magical 💕
    </p>

    <button onclick="showLove()">Click here 💌</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <h2>💖 Sakshi 💖</h2>
    <p>I love you so much 💕<br><br>
    Will you be mine forever? 💍🥺</p>
</div>

<!-- Music -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<script>
function showLove() {
    document.getElementById("popup").classList.add("show");
    document.getElementById("music").play();

    // Create hearts
    for(let i=0; i<20; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (2 + Math.random()*3) + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }
}
</script>

</body>
</html>
