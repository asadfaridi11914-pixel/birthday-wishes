<!DOCTYPE html>
<html>
<head>
<title>For Sakshi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    text-align: center;
    background: radial-gradient(circle at top, #ff6a88, #ff99ac, #ffdde1);
    color: white;
}

/* Main Container */
.container {
    margin-top: 120px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 0 40px rgba(255, 105, 180, 0.4);
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(50px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 50px;
    text-shadow: 0 0 20px white;
}

/* Buttons */
button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    margin: 10px;
}

.yes { background: #ff4d6d; color: white; }
.no { background: white; color: #ff4d6d; position: absolute; }

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    color: #ff4d6d;
    padding: 40px;
    border-radius: 25px;
    transition: 0.4s;
}

.popup.show {
    transform: translate(-50%, -50%) scale(1);
}

/* Slide Screen */
.slide {
    position: fixed;
    top: 0;
    left: 100%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #ff4d6d, #ff99ac);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: 0.8s ease;
}

.slide.show {
    left: 0;
}

/* Typing */
#finalText {
    font-size: 45px;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 22px;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh);}
    100% { transform: translateY(-10vh);}
}

/* Fireworks */
.firework {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}

</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday Sakshi 💖</h1>
    <p>You are my forever ✨</p>
    <button onclick="startLove()">Click here 💌</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <h2>💖 Sakshi 💖</h2>
    <p>Will you be mine forever? 💍🥺</p>

    <button class="yes" onclick="yesClick()">YES 💖</button>
    <button class="no" id="noBtn">NO 😢</button>
</div>

<!-- Final Slide -->
<div class="slide" id="slide">
    <div id="finalText"></div>
</div>

<!-- 🎶 UPDATED MUSIC -->
<audio id="music" loop>
    <source src="https://docs.google.com/uc?export=download&id=1-W1nyq2Jo3Oy7cS-JM3SZjG8AO0yNJQJ" type="audio/mpeg">
</audio>

<script>
function startLove() {
    document.getElementById("popup").classList.add("show");

    let music = document.getElementById("music");
    music.play().catch(()=>{});

    createHearts(25);
}

// YES → FINAL MAGIC
function yesClick() {
    document.getElementById("slide").classList.add("show");

    typeText("💖 ASAD IS TOTALLY YOURS 💖");

    createHearts(40);
    fireworks();
}

// Typing Effect
function typeText(text) {
    let i = 0;
    let target = document.getElementById("finalText");

    function typing() {
        if (i < text.length) {
            target.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 80);
        }
    }
    typing();
}

// Hearts generator
function createHearts(num) {
    for(let i=0; i<num; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "vw";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }
}

// Fireworks 🎆
function fireworks() {
    for(let i=0; i<80; i++){
        let f = document.createElement("div");
        f.className = "firework";

        let x = (Math.random()-0.5)*400 + "px";
        let y = (Math.random()-0.5)*400 + "px";

        f.style.setProperty('--x', x);
        f.style.setProperty('--y', y);

        f.style.left = "50%";
        f.style.top = "50%";

        document.body.appendChild(f);

        setTimeout(()=>f.remove(),1000);
    }
}

// NO button escape
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
