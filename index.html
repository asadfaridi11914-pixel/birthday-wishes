<!DOCTYPE html>
<html>
<head>
<title>For Sakshi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(135deg, #ffafbd, #ffc3a0);
}

/* Container */
.container {
    margin-top: 120px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 40px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
    color: white;
    box-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
}

h1 {
    font-size: 48px;
}

/* Button */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    margin: 10px;
}

.yes {
    background: #ff4d6d;
    color: white;
}

.no {
    background: white;
    color: #ff4d6d;
    position: absolute;
}

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    color: deeppink;
    padding: 35px;
    border-radius: 25px;
    text-align: center;
    transition: 0.4s;
}

.popup.show {
    transform: translate(-50%, -50%) scale(1);
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 22px;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}

</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday Sakshi 💖</h1>
    <p>You make my life beautiful ✨</p>

    <button onclick="showLove()">Click here 💌</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <h2>💖 Sakshi 💖</h2>
    <p>Will you be mine forever? 💍🥺</p>

    <button class="yes" onclick="accepted()">YES 💖</button>
    <button class="no" id="noBtn">NO 😢</button>

    <p id="result"></p>
</div>

<!-- Music -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<script>
function showLove() {
    document.getElementById("popup").classList.add("show");
    document.getElementById("music").play();

    // hearts
    for(let i=0; i<20; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
    }
}

// YES clicked
function accepted() {
    document.getElementById("result").innerHTML = 
    "💖 Now Asad is totally yours 💖";
}

// NO button moves
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", function() {
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
