<!DOCTYPE html>
<html>
<head>
<title>For Sakshi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
}

/* Section */
.section {
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Active section */
.active {
    display: flex;
}

/* Card */
.card {
    background: rgba(255,255,255,0.2);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    width: 70%;
}

/* Buttons */
button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    margin: 10px;
    cursor: pointer;
    font-size: 16px;
}

.yes {
    background: white;
    color: #ff4d6d;
}

.no {
    background: #ff4d6d;
    color: white;
    position: relative;
    transition: 0.3s;
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* Final text */
#finalText {
    font-size: 35px;
}
</style>

</head>

<body>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div class="section active" id="page1">
    <div class="card">
        <h1>💖 For Sakshi 💖</h1>
        <p>A special surprise for you ✨</p>
        <button onclick="startMusic(); nextPage(2)">Open 💌</button>
    </div>
</div>

<!-- PAGE 2 -->
<div class="section" id="page2">
    <div class="card">
        <h1>🎂 Happy Birthday Sakshi 💖</h1>
        <p>
            You are the most beautiful part of my life ✨<br>
            Every moment with you feels magical 💕
        </p>
        <button onclick="nextPage(3)">Next 💫</button>
    </div>
</div>

<!-- PAGE 3 -->
<div class="section" id="page3">
    <div class="card">
        <h1>💍 Sakshi 💖</h1>
        <p>Will you be mine forever? 🥺</p>

        <button class="yes" onclick="yesClick()">YES 💖</button>
        <button class="no" id="noBtn">NO 😢</button>
    </div>
</div>

<!-- PAGE 4 -->
<div class="section" id="page4">
    <h1 id="finalText"></h1>
</div>

<script>

// Page switch
function nextPage(num) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById("page"+num).classList.add("active");
}

// Music
function startMusic() {
    let music = document.getElementById("music");
    music.play().catch(()=>{});
}

// YES
function yesClick() {
    nextPage(4);
    typeText("💖 ASAD IS TOTALLY YOURS 💖");

    for(let i=0;i<30;i++){
        let heart=document.createElement("div");
        heart.innerHTML="💖";
        heart.className="heart";
        heart.style.left=Math.random()*100+"vw";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),4000);
    }
}

// Typing
function typeText(text){
    let i=0;
    let el=document.getElementById("finalText");

    function type(){
        if(i<text.length){
            el.innerHTML+=text[i];
            i++;
            setTimeout(type,80);
        }
    }
    type();
}

// NO escape
let noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
    noBtn.style.position="absolute";
    noBtn.style.left=Math.random()*80+"vw";
    noBtn.style.top=Math.random()*80+"vh";
});

</script>

</body>
</html>
