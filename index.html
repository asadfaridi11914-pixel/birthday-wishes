<!DOCTYPE html>
<html>
<head>
<title>For Sakshi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
}

/* Container */
.container {
    margin-top: 120px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 40px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 48px;
}

/* Button */
.main-btn {
    padding: 14px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
    transition: 0.3s;
}

.main-btn:hover {
    transform: scale(1.1);
}

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    color: #ff4d6d;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    transition: 0.4s ease;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.popup.show {
    transform: translate(-50%, -50%) scale(1);
}

/* Buttons */
.yes, .no {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.yes {
    background: #ff4d6d;
    color: white;
}

.no {
    background: white;
    color: #ff4d6d;
    position: absolute;
}

/* Result */
#result {
    margin-top: 20px;
    font-size: 22px;
    animation: pop 1s ease;
}

@keyframes pop {
    0% {transform: scale(0);}
    100% {transform: scale(1);}
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday Sakshi 💖</h1>
    <p>You make my world magical ✨</p>

    <button class="main-btn" onclick="startLove()">Click here 💌</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <h2>💖 Sakshi 💖</h2>
    <p>Will you be mine forever? 💍🥺</p>

    <button class="yes" onclick="yesClick()">YES 💖</button>
    <button class="no" id="noBtn">NO 😢</button>

    <p id="result"></p>
</div>

<!-- Music -->
<audio id="music">
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
function startLove() {
    let popup = document.getElementById("popup");
    popup.classList.add("show");

    let music = document.getElementById("music");
    music.play().catch(()=>{});

    // hearts
    for(let i=0; i<25; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.animationDuration = (2 + Math.random()*3) + "s";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }
}

// YES
function yesClick() {
    let result = document.getElementById("result");
    result.innerHTML = "💖 Now Asad is totally yours 💖";

    // more hearts burst
    for(let i=0; i<30; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "vw";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }
}

// NO button escape
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
