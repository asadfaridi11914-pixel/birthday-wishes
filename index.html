<!DOCTYPE html>
<html>
<head>
<title>For Sakshi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff6a88, #ff99ac, #ffc3a0);
    overflow: hidden;
    color: white;
}

/* Animated background glow */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
    animation: moveBg 10s infinite alternate;
}

@keyframes moveBg {
    0% { transform: translate(-20%, -20%); }
    100% { transform: translate(20%, 20%); }
}

/* Container */
.container {
    position: relative;
    margin-top: 120px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 40px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 10px 50px rgba(0,0,0,0.3);
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(50px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 50px;
    text-shadow: 0 0 20px white;
}

/* Button */
.main-btn {
    padding: 14px 30px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
    transition: 0.3s;
}

.main-btn:hover {
    transform: scale(1.15);
}

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    color: #ff4d6d;
    padding: 40px;
    border-radius: 25px;
    transition: 0.4s;
    box-shadow: 0 10px 50px rgba(0,0,0,0.4);
}

.popup.show {
    transform: translate(-50%, -50%) scale(1);
}

/* Buttons */
.yes, .no {
    padding: 12px 20px;
    margin: 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.yes {
    background: #ff4d6d;
    color: white;
}

.no {
    background: white;
    color: #ff4d6d;
    position: absolute;
}

/* Result */
#result {
    margin-top: 20px;
    font-size: 24px;
    animation: pop 1s ease;
}

@keyframes pop {
    from {transform: scale(0);}
    to {transform: scale(1);}
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 22px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday Sakshi 💖</h1>
    <p>You are my happiness ✨</p>

    <button class="main-btn" onclick="startLove()">Click here 💌</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <h2>💖 Sakshi 💖</h2>
    <p>Will you be mine forever? 💍🥺</p>

    <button class="yes" onclick="yesClick()">YES 💖</button>
    <button class="no" id="noBtn">NO 😢</button>

    <p id="result"></p>
</div>

<!-- WORKING MUSIC -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c9c3d0c09.mp3?filename=romantic-ambient-11064.mp3" type="audio/mp3">
</audio>

<script>
function startLove() {
    document.getElementById("popup").classList.add("show");

    let music = document.getElementById("music");
    music.volume = 0.6;
    music.play().catch(()=>{});

    // hearts animation
    for(let i=0; i<30; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.animationDuration = (2 + Math.random()*3) + "s";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),5000);
    }
}

// YES
function yesClick() {
    document.getElementById("result").innerHTML =
    "💖 Now Asad is totally yours 💖";

    // extra hearts burst
    for(let i=0; i<40; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "vw";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }
}

// NO button escape
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
