<!DOCTYPE html>
<html>
<head>
<title>For Sakshi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    scroll-behavior: smooth;
}

/* Sections */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: white;
}

/* Backgrounds */
.home { background: linear-gradient(135deg, #ff6a88, #ff99ac); }
.birthday { background: linear-gradient(135deg, #ff758c, #ff7eb3); }
.proposal { background: linear-gradient(135deg, #ff4d6d, #ff99ac); }
.final { background: radial-gradient(circle, #ff4d6d, #ffdde1); }

/* Button */
button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    margin: 10px;
    font-size: 16px;
}

.yes { background: white; color: #ff4d6d; }
.no { background: #ff4d6d; color: white; position: absolute; }

/* Fade animation */
.fade {
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c9c3d0c09.mp3" type="audio/mp3">
</audio>

<!-- HOME -->
<section class="section home fade">
    <h1>💖 For Sakshi 💖</h1>
    <p>A special surprise for you ✨</p>
    <button onclick="startMusic(); scrollToSection('birthday')">Start 💌</button>
</section>

<!-- BIRTHDAY -->
<section id="birthday" class="section birthday fade">
    <h1>🎂 Happy Birthday Sakshi 💖</h1>
    <p>
        You are the most beautiful part of my life ✨<br>
        Every moment with you feels magical 💕
    </p>
    <button onclick="scrollToSection('proposal')">Next 💫</button>
</section>

<!-- PROPOSAL -->
<section id="proposal" class="section proposal fade">
    <h1>💍 Sakshi 💖</h1>
    <p>Will you be mine forever? 🥺</p>

    <button class="yes" onclick="yesClick()">YES 💖</button>
    <button class="no" id="noBtn">NO 😢</button>
</section>

<!-- FINAL -->
<section id="final" class="section final">
    <h1 id="finalText"></h1>
</section>

<script>
function startMusic() {
    let music = document.getElementById("music");

    music.volume = 0.7;

    // force load
    music.load();

    // try play
    let playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise.then(() => {
            console.log("Music started");
        }).catch(() => {
            document.body.addEventListener('click', () => {
                music.play();
            });
        });
    }
}

function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

// YES CLICK
function yesClick() {
    scrollToSection('final');
    typeText("💖 ASAD IS TOTALLY YOURS 💖");

    // hearts
    for(let i=0;i<40;i++){
        let heart = document.createElement("div");
        heart.innerHTML="💖";
        heart.className="heart";
        heart.style.left=Math.random()*100+"vw";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }
}

// typing
function typeText(text){
    let i=0;
    let target=document.getElementById("finalText");

    function type(){
        if(i<text.length){
            target.innerHTML+=text.charAt(i);
            i++;
            setTimeout(type,80);
        }
    }
    type();
}

// NO button escape
let noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
    let x=Math.random()*window.innerWidth;
    let y=Math.random()*window.innerHeight;

    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";
});
</script>

</body>
</html>
