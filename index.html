<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
  text-align: center;
  color: white;
}

/* Floating hearts */
.heart {
  position: absolute;
  bottom: -50px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-800px); opacity: 0; }
}

/* Main box */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Buttons */
button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 25px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.yes {
  background: #ff4d6d;
  color: white;
}

.no {
  background: white;
  color: #ff4d6d;
}

/* Slide animation */
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 100%;
  left: 0;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  transition: 1s;
}

.show {
  top: 0;
}

/* Fade text */
.fade {
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<!-- 🎶 MUSIC -->
<audio autoplay loop>
  <source src="https://docs.google.com/uc?export=download&id=1-W1nyq2Jo3Oy7cS-JM3SZjG8AO0yNJQJ" type="audio/mpeg">
</audio>

<!-- 💖 MAIN CONTENT -->
<div class="container">
  <h1 class="fade">Do you love me? ❤️</h1>
  <button class="yes" onclick="yesClick()">Yes 😍</button>
  <button class="no" onmouseover="moveNo()">No 😜</button>
</div>

<!-- 💌 SECOND SLIDE -->
<div id="slide" class="slide">
  <h1 class="fade">ASAD IS TOTALLY YOURS ❤️</h1>
</div>

<script>

/* Move NO button */
function moveNo() {
  const btn = document.querySelector('.no');
  btn.style.position = 'absolute';
  btn.style.top = Math.random() * window.innerHeight + 'px';
  btn.style.left = Math.random() * window.innerWidth + 'px';
}

/* YES click */
function yesClick() {
  document.getElementById('slide').classList.add('show');
}

/* Floating hearts generator */
setInterval(() => {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.innerHTML = '❤️';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);

</script>

</body>
</html>
