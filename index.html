<!DOCTYPE html>
<html>
<head>
<title>For Sakshi 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    text-align: center;
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
    color: white;
}

/* Container */
.container {
    margin-top: 120px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
}

/* Button */
button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    margin: 10px;
}

.yes { background: #ff4d6d; color: white; }
.no { background: white; color: #ff4d6d; position: absolute; }

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    color: #ff4d6d;
    padding: 40px;
    border-radius: 25px;
    transition: 0.4s;
}

.popup.show {
    transform: translate(-50%, -50%) scale(1);
}

/* Slide Page */
.slide {
    position: fixed;
    top: 0;
    left: 100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ff4d6d, #ff99ac);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    transition: 0.7s ease;
}

.slide.show {
    left: 0;
}

/* Typing effect */
#finalText {
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 22px;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}

</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday Sakshi 💖</h1>
    <p>You are my happiness ✨</p>
    <button onclick="startLove()">Click here 💌</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <h2>💖 Sakshi 💖</h2>
    <p>Will you be mine forever? 💍🥺</p>

    <button class="yes" onclick="yesClick()">YES 💖</button>
    <button class="no" id="noBtn">NO 😢</button>
</div>

<!-- Final Slide -->
<div class="slide" id="slide">
    <div id="finalText"></div>
</div>

<!-- Music -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c9c3d0c09.mp3">
</audio>

<script>
function startLove() {
    document.getElementById("popup").classList.add("show");

    let music = document.getElementById("music");
    music.play().catch(()=>{});

    // hearts
    for(let i=0; i<25; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "vw";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }
}

// YES click → slide comes
function yesClick() {
    let slide = document.getElementById("slide");
    slide.classList.add("show");

    typeText("💖 ASAD IS TOTALLY YOURS 💖");

    // celebration hearts
    for(let i=0; i<40; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "vw";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }
}

// typing effect
function typeText(text) {
    let i = 0;
    let speed = 80;
    let target = document.getElementById("finalText");

    function typing() {
        if (i < text.length) {
            target.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

// NO button escape
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
