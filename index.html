<!DOCTYPE html>
<html>
<head>
<title>For Sakshi 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    color: white;
}

/* Animated luxury gradient */
body {
    background: linear-gradient(-45deg, #ff6a88, #ff99ac, #ff758c, #ffb6c1);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Sections */
.section {
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    opacity: 0;
    transform: scale(0.9);
    transition: 0.8s ease;
}

.section.active {
    display: flex;
    opacity: 1;
    transform: scale(1);
}

/* Glass card */
.card {
    background: rgba(255,255,255,0.15);
    padding: 40px;
    border-radius: 25px;
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    width: 75%;
}

/* Headings */
h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    opacity: 0.9;
}

/* Buttons */
button {
    padding: 12px 28px;
    border-radius: 30px;
    border: none;
    margin: 15px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.yes {
    background: white;
    color: #ff4d6d;
}

.no {
    background: #ff4d6d;
    color: white;
    position: relative;
}

/* Floating hearts */
.heart {
    position: absolute;
    font-size: 22px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* Final text typing */
#finalText {
    font-size: 38px;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
}

/* Glow effect */
.glow {
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 10px white;}
    to {text-shadow: 0 0 25px hotpink;}
}
</style>

</head>

<body>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div class="section active" id="page1">
    <div class="card glow">
        <h1>💖 For Sakshi 💖</h1>
        <p>A special surprise just for you ✨</p>
        <button onclick="startMusic(); nextPage(2)">Open 💌</button>
    </div>
</div>

<!-- PAGE 2 -->
<div class="section" id="page2">
    <div class="card">
        <h1>🎂 Happy Birthday Sakshi 💖</h1>
        <p>
            You are the most beautiful part of my life ✨<br>
            Every moment with you feels magical 💕<br><br>

            I will love you forever 💖<br>
            Your happiness is my peace ✨
        </p>
        <button onclick="nextPage(3)">Next 💫</button>
    </div>
</div>

<!-- PAGE 3 -->
<div class="section" id="page3">
    <div class="card">
        <h1>💍 Sakshi 💖</h1>
        <p>Will you be mine forever? 🥺</p>

        <button class="yes" onclick="yesClick()">YES 💖</button>
        <button class="no" id="noBtn">NO 😢</button>
    </div>
</div>

<!-- FINAL -->
<div class="section" id="page4">
    <h1 id="finalText"></h1>
</div>

<script>

// Page transition
function nextPage(num) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById("page"+num).classList.add("active");
}

// Music
function startMusic() {
    let music = document.getElementById("music");
    music.volume = 0.7;
    music.play().catch(()=>{});
}

// YES click
function yesClick() {
    nextPage(4);
    typeText("💖 ASAD IS TOTALLY YOURS 💖");

    for(let i=0;i<40;i++){
        let heart=document.createElement("div");
        heart.innerHTML="💖";
        heart.className="heart";
        heart.style.left=Math.random()*100+"vw";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),5000);
    }
}

// Typing effect
function typeText(text){
    let i=0;
    let target=document.getElementById("finalText");

    function type(){
        if(i<text.length){
            target.innerHTML+=text[i];
            i++;
            setTimeout(type,80);
        }
    }
    type();
}

// NO button escape 😈
let noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
    noBtn.style.position="absolute";
    noBtn.style.left=Math.random()*85+"vw";
    noBtn.style.top=Math.random()*85+"vh";
});

</script>

</body>
</html>
